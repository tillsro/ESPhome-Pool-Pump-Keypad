name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ESPHOME_BUILD_PATH: ${{ runner.temp }}/esphome-build

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
          cache: pip
          cache-dependency-path: requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Prepare non-secret build configuration
        run: cp esphome/secrets.example.yaml esphome/secrets.yaml

      - name: Run protocol tests
        run: python -m unittest tests.test_pump_emulator -v

      - name: Validate ESPHome configuration
        run: esphome config esphome/pool-pump-controller.yaml

      - name: Compile AtomS3 firmware
        run: esphome compile esphome/pool-pump-controller.yaml
