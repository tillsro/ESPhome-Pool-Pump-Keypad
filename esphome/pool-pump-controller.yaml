substitutions:
  pump_speed_level_1: "1000"
  pump_speed_level_2: "1400"
  pump_speed_level_3: "1800"
  pump_speed_level_4: "2500"
  pump_speed_level_5: "3450"
  display_dim_after: 1min
  display_sleep_after_dimming: 4min
  display_dim_percent: "20"

esphome:
  name: pool-pump-controller
  friendly_name: Pool Pump Controller
  on_boot:
    - priority: -100
      then:
        - delay: 200ms
        - lambda: |-
            id(display_ready) = true;
        # The AtomS3 LCD wake command must run after SPI/display setup.
        - script.execute: display_wake

esp32:
  board: m5stack-atoms3
  framework:
    type: arduino

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

web_server:
  port: 80

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: Pool-Pump-Controller
    password: !secret fallback_ap_password

captive_portal:

external_components:
  - source: components
    components: [iliving_pump]

uart:
  id: rs485_uart
  baud_rate: 38400
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_pin: GPIO5
  tx_pin: GPIO6
  rx_buffer_size: 256

iliving_pump:
  id: pump_controller
  uart_id: rs485_uart
  poll_interval: 61ms
  reply_timeout: 55ms
  offline_timeout: 500ms
  telemetry_interval: 500ms
  startup_delay: 1s

  # STOPPED is deterministic and fail-safe: every Atom boot commands zero RPM.
  # PASSIVE sends nothing until Pump Run is explicitly changed.
  startup_mode: STOPPED
  initial_target_rpm: ${pump_speed_level_3}
  stop_on_communication_loss: true

  run:
    name: Pump Run
    id: pump_run
    on_turn_on:
      - script.execute: display_wake
    on_turn_off:
      - script.execute: display_wake
  demand_rpm:
    name: Pump Demand RPM
    id: pump_demand_rpm
    on_value:
      - script.execute: display_wake
  actual_rpm:
    name: Pump RPM
    id: pump_rpm
  accepted_rpm:
    name: Pump Accepted RPM
    id: pump_accepted_rpm
  online:
    name: Pump Communication
    id: pump_online
    on_press:
      - script.execute: display_wake
    on_release:
      - script.execute: display_wake
  motor_running:
    name: Pump Motor Running
    id: pump_motor_running
    on_press:
      - script.execute: display_wake
    on_release:
      - script.execute: display_wake
  control_active:
    name: Pump Controller Active
    id: pump_control_active
  fault:
    name: Pump Fault
    id: pump_fault
    on_press:
      - script.execute: display_wake
    on_release:
      - script.execute: display_wake
  fault_code:
    name: Pump Fault Code
    id: pump_fault_code
  status:
    name: Pump Status
    id: pump_status
  fault_text:
    name: Pump Fault Description
    id: pump_fault_text
  valid_replies:
    name: Pump Valid Replies
    id: pump_valid_replies
  missed_replies:
    name: Pump Missed Replies
    id: pump_missed_replies
  discarded_bytes:
    name: Pump Discarded UART Bytes
    id: pump_discarded_bytes

binary_sensor:
  - platform: gpio
    id: atoms3_button
    name: AtomS3 Button
    pin:
      number: GPIO41
      inverted: true
      mode:
        input: true
        pullup: true
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_multi_click:
      # A quick press starts a stopped pump at the selected speed. Once running,
      # quick presses select the next of five pump-speed presets.
      - timing:
          - ON for at most 800ms
          - OFF for at least 50ms
        then:
          - if:
              condition:
                lambda: return id(display_sleeping);
              then:
                # The first short press only wakes the screen. It must not
                # start the pump or change its selected speed.
                - script.execute: display_wake
              else:
                - if:
                    condition:
                      switch.is_off: pump_run
                    then:
                      - switch.turn_on: pump_run
                    else:
                      - number.set:
                          id: pump_demand_rpm
                          value: !lambda |-
                            const float current = id(pump_demand_rpm).state;
                            if (std::isnan(current) || current >= ${pump_speed_level_5}.0f)
                              return ${pump_speed_level_1}.0f;
                            if (current < ${pump_speed_level_2}.0f)
                              return ${pump_speed_level_2}.0f;
                            if (current < ${pump_speed_level_3}.0f)
                              return ${pump_speed_level_3}.0f;
                            if (current < ${pump_speed_level_4}.0f)
                              return ${pump_speed_level_4}.0f;
                            return ${pump_speed_level_5}.0f;

      # Stop immediately when the hold reaches 1.5 seconds; release is not
      # required. Force a display refresh so the red state appears at once.
      - timing:
          - ON for at least 1500ms
        then:
          - switch.turn_off: pump_run
          - script.execute: display_wake
          - component.update: disp

spi:
  clk_pin: GPIO17
  mosi_pin: GPIO21

output:
  - platform: ledc
    id: backlight_pwm
    pin: GPIO16
    frequency: 500Hz
    max_power: 99%
    zero_means_zero: true

globals:
  - id: last_brightness
    type: float
    restore_value: true
    initial_value: "100.0"
  - id: display_ready
    type: bool
    restore_value: false
    initial_value: "false"
  - id: display_sleeping
    type: bool
    restore_value: false
    initial_value: "true"
  - id: display_sleep_command_ms
    type: uint32_t
    restore_value: false
    initial_value: "0"

script:
  # Restarting this script records display activity without storing timestamps.
  # The second delay is measured from the dim event, for five total idle minutes.
  - id: display_idle_timer
    mode: restart
    then:
      - delay: ${display_dim_after}
      - if:
          condition:
            lambda: |-
              return id(display_ready) && !id(display_sleeping) &&
                     !id(pump_fault).state;
          then:
            - lambda: |-
                const float wake_level =
                    id(last_brightness) > 0.0f ? id(last_brightness) : 100.0f;
                const float dim_level =
                    std::min(wake_level, ${display_dim_percent}.0f);
                id(backlight_pwm).set_level(dim_level / 100.0f);
      - delay: ${display_sleep_after_dimming}
      - if:
          condition:
            lambda: |-
              return id(display_ready) && !id(display_sleeping) &&
                     !id(pump_fault).state;
          then:
            - script.execute: display_sleep

  - id: display_sleep
    mode: restart
    then:
      - if:
          condition:
            lambda: return id(display_ready) && !id(display_sleeping);
          then:
            - script.stop: display_idle_timer
            - component.suspend: disp
            - lambda: |-
                id(backlight_pwm).set_level(0.0f);
                id(disp).enable();
                id(disp).transfer_byte(0x28);  // Display OFF
                id(disp).disable();
                id(disp).enable();
                id(disp).transfer_byte(0x10);  // Sleep IN
                id(disp).disable();
                id(display_sleep_command_ms) = millis();
                id(display_sleeping) = true;

  - id: display_wake
    mode: restart
    then:
      - if:
          condition:
            lambda: return id(display_ready);
          then:
            - script.stop: display_idle_timer
            - if:
                condition:
                  lambda: return id(display_sleeping);
                then:
                  # GC9107 requires 120 ms between Sleep IN and Sleep OUT.
                  - delay: !lambda |-
                      const uint32_t elapsed =
                          millis() - id(display_sleep_command_ms);
                      return elapsed >= 120U ? 0U : 120U - elapsed;
                  - lambda: |-
                      id(disp).enable();
                      id(disp).transfer_byte(0x11);  // Sleep OUT
                      id(disp).disable();
                  - delay: 120ms
                  - lambda: |-
                      id(disp).enable();
                      id(disp).transfer_byte(0x29);  // Display ON
                      id(disp).disable();
                      id(display_sleeping) = false;
                  - component.resume: disp
                  - component.update: disp
            - number.set:
                id: screen_brightness
                value: !lambda |-
                  return id(last_brightness) > 0.0f
                             ? id(last_brightness)
                             : 100.0f;

switch:
  - platform: template
    id: screen_backlight_switch
    name: Screen Backlight
    entity_category: config
    lambda: |-
      return !id(display_sleeping) && id(screen_brightness).state > 0.0f;
    turn_on_action:
      - script.execute: display_wake
    turn_off_action:
      - script.execute: display_sleep

number:
  - platform: template
    id: screen_brightness
    name: Screen Brightness
    entity_category: config
    min_value: 0
    max_value: 100
    step: 1
    restore_value: true
    initial_value: 100
    optimistic: true
    set_action:
      - if:
          condition:
            lambda: return x <= 0.0f;
          then:
            - script.execute: display_sleep
          else:
            - lambda: |-
                id(last_brightness) = x;
                if (!id(display_sleeping))
                  id(backlight_pwm).set_level(x / 100.0f);
            - if:
                condition:
                  lambda: return id(display_sleeping);
                then:
                  - script.execute: display_wake
                else:
                  - script.execute: display_idle_timer

font:
  - file: gfonts://Roboto Mono
    id: font_rpm
    size: 38
  - file: gfonts://Roboto Mono
    id: font_small
    size: 14

display:
  - platform: st7789v
    id: disp
    model: Custom
    # AtomS3/GC9107 quirk: 129 clears the otherwise-stale leftmost column.
    width: 129
    height: 128
    offset_width: 0
    offset_height: 0
    cs_pin: GPIO15
    dc_pin: GPIO33
    reset_pin: GPIO34
    rotation: 180
    update_interval: 500ms
    lambda: |-
      Color background(55, 61, 62);
      if (id(pump_fault).state) {
        background = Color(190, 45, 45);
      } else if (!id(pump_run).state) {
        background = Color(185, 66, 48);
      } else if (id(pump_online).state && id(pump_motor_running).state) {
        background = Color(26, 145, 82);
      } else if (id(pump_online).state) {
        background = Color(185, 66, 48);
      }
      it.fill(background);

      const Color ink(255, 255, 255);
      const char *status = id(pump_status).state.empty()
                               ? "STARTING"
                               : id(pump_status).state.c_str();
      it.printf(64, 4, id(font_small), ink, TextAlign::TOP_CENTER, "%s", status);

      if (id(pump_rpm).has_state()) {
        it.printf(64, 35, id(font_rpm), ink, TextAlign::TOP_CENTER, "%.0f", id(pump_rpm).state);
      } else {
        it.printf(64, 43, id(font_small), ink, TextAlign::TOP_CENTER, "NO DATA");
      }

      const float target = id(pump_demand_rpm).state;
      int speed_level = 0;
      if (std::fabs(target - ${pump_speed_level_1}.0f) < 1.0f)
        speed_level = 1;
      else if (std::fabs(target - ${pump_speed_level_2}.0f) < 1.0f)
        speed_level = 2;
      else if (std::fabs(target - ${pump_speed_level_3}.0f) < 1.0f)
        speed_level = 3;
      else if (std::fabs(target - ${pump_speed_level_4}.0f) < 1.0f)
        speed_level = 4;
      else if (std::fabs(target - ${pump_speed_level_5}.0f) < 1.0f)
        speed_level = 5;

      if (speed_level != 0) {
        it.printf(64, 89, id(font_small), ink, TextAlign::TOP_CENTER, "LEVEL %d / 5",
                  speed_level);
      } else {
        it.printf(64, 89, id(font_small), ink, TextAlign::TOP_CENTER, "CUSTOM SPEED");
      }
      it.printf(64, 107, id(font_small), ink, TextAlign::TOP_CENTER, "TARGET %.0f", target);
